name: Notify Koi

on:
  push:
    paths:
      - 'data/*.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          for f in data/*.json; do
            [ -f "$f" ] || continue
            
            STATUS=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('status',''))" 2>/dev/null)
            NAME=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('name',''))" 2>/dev/null)
            
            MSG=""
            if [ "$STATUS" = "briefing" ]; then
              MSG="🔔 ${NAME} — Пусни за задание! Статус: briefing"
            elif [ "$STATUS" = "building" ]; then
              MSG="🔨 ${NAME} — Одобрено за билд! Статус: building"
            fi
            
            if [ -n "$MSG" ]; then
              python3 -c "
import urllib.request, json

data = json.dumps({
    'chat_id': '-1003818348002',
    'message_thread_id': 49,
    'text': '''$MSG'''
}).encode()

req = urllib.request.Request(
    'https://api.telegram.org/bot${BOT_TOKEN}/sendMessage',
    data=data,
    headers={'Content-Type': 'application/json'}
)
resp = urllib.request.urlopen(req)
print(resp.read().decode()[:200])
"
            fi
          done
