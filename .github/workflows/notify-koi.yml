name: Notify Koi

on:
  push:
    paths:
      - 'data/*.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files only
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003818348002"
          TOPIC_ID: "49"
        run: |
          # Get only the files that changed in THIS commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'data/*.json' 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No data files changed"
            exit 0
          fi

          python3 << PYEOF
          import json, os, urllib.request

          bot_token = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          topic_id = int(os.environ["TOPIC_ID"])
          changed_files = """$CHANGED""".strip().split('\n')

          triggers = {
              "briefing": "🔔 Пусни за задание!",
              "qa_submitted": "💬 Нови отговори на въпроси!",
              "building": "🔨 Одобрено за билд!",
              "revisions": "🔧 Нови корекции за изпълнение!",
              "approved": "✅ Проектът е одобрен!",
              "dns_setup": "🌐 Домейн зададен — подготви DNS данни!",
              "deploying": "📡 DNS потвърден — качвай на домейна!",
          }

          for fpath in changed_files:
              fpath = fpath.strip()
              if not fpath or not fpath.endswith('.json'):
                  continue
              try:
                  with open(fpath) as f:
                      d = json.load(f)
                  status = d.get("status", "")
                  name = d.get("name", "unknown")
              except:
                  continue

              if status not in triggers:
                  continue

              msg = f"{triggers[status]}\nПроект: {name}"
              if status == "revisions" and d.get("currentRevision"):
                  msg += f"\n\n📝 Корекции:\n{d['currentRevision']}"
              if status == "dns_setup" and d.get("deployDomain"):
                  msg += f"\n🌐 Домейн: {d['deployDomain']}"
              if status == "approved" and d.get("deployDomain"):
                  msg += f"\n🌐 Домейн: {d['deployDomain']}"

              payload = json.dumps({
                  "chat_id": chat_id,
                  "message_thread_id": topic_id,
                  "text": msg
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{bot_token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"}
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"OK: {name} ({status}) -> {resp.status}")
              except Exception as e:
                  print(f"ERROR: {name} -> {e}")
          PYEOF
