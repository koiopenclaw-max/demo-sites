name: Notify Koi

on:
  push:
    paths:
      - 'data/*.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003818348002"
          TOPIC_ID: "49"
        run: |
          python3 << 'PYEOF'
          import json, os, glob, urllib.request

          bot_token = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          topic_id = int(os.environ["TOPIC_ID"])

          triggers = {
              "briefing": "🔔 Пусни за задание!",
              "qa_submitted": "💬 Нови отговори на въпроси!",
              "building": "🔨 Одобрено за билд!",
              "revisions": "🔧 Нови корекции за изпълнение!",
              "approved": "✅ Проектът е одобрен!"
          }

          for fpath in glob.glob("data/*.json"):
              try:
                  with open(fpath) as f:
                      d = json.load(f)
                  status = d.get("status", "")
                  name = d.get("name", "unknown")
              except:
                  continue

              if status not in triggers:
                  continue

              msg = f"{triggers[status]} Проект: {name} | Status: {status}"
              if status == "revisions" and d.get("currentRevision"):
                  msg += f"\n\n📝 Корекции:\n{d['currentRevision']}"

              payload = json.dumps({
                  "chat_id": chat_id,
                  "message_thread_id": topic_id,
                  "text": msg
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{bot_token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"}
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"OK: {name} ({status}) -> {resp.status}")
              except Exception as e:
                  print(f"ERROR: {name} -> {e}")
          PYEOF
