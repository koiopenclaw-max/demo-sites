name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject write key
        env:
          DEPLOY_KEY: ${{ secrets.GH_API_TOKEN }}
        run: |
          # Replace the placeholder with actual token
          sed -i "s|<!--DEPLOY_KEY-->|${DEPLOY_KEY}|g" index.html
          # Verify: placeholder should be gone, token should NOT appear in git diff (not committed)
          if grep -q '<!--DEPLOY_KEY-->' index.html; then
            echo "WARNING: Injection may have failed"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
