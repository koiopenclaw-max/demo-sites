name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API token
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
        run: |
          sed -i "s|__GH_API_TOKEN__|${GH_API_TOKEN}|g" index.html
          # Verify injection
          if grep -q "__GH_API_TOKEN__" index.html; then
            echo "ERROR: Token injection failed!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
