<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Sites — Мениджър на проекти</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0d0d1a;
  --bg-main: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-hover: #1c2a4a;
  --bg-input: #0f1b33;
  --accent: #F0A500;
  --accent-dim: #c48800;
  --accent-glow: rgba(240, 165, 0, 0.15);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --text-muted: #555570;
  --success: #2ecc71;
  --danger: #e74c3c;
  --info: #3498db;
  --purple: #9b59b6;
  --border: #2a2a4a;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-deep); color: var(--text);
  min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.header {
  background: linear-gradient(135deg, var(--bg-main) 0%, #0e1628 100%);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
}
.header-brand { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
.header-logo {
  width: 36px; height: 36px; background: var(--accent); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1.1rem; color: var(--bg-deep);
  box-shadow: 0 0 20px var(--accent-glow);
}
.header-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
.header-title span { color: var(--accent); }
.poll-indicator { font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem; }
.poll-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.view { display: none; animation: fadeIn 0.35s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.65rem 1.25rem; border: none; border-radius: var(--radius-sm);
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: all var(--transition); text-decoration: none; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: var(--bg-deep); box-shadow: 0 2px 12px rgba(240,165,0,0.3); }
.btn-primary:hover:not(:disabled) { background: #ffb920; box-shadow: 0 4px 20px rgba(240,165,0,0.45); transform: translateY(-1px); }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--accent-dim); }
.btn-ghost { background: transparent; color: var(--text-dim); padding: 0.5rem 0.75rem; }
.btn-ghost:hover { color: var(--accent); }
.btn-danger { background: rgba(231,76,60,0.15); color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
.btn-danger:hover { background: rgba(231,76,60,0.25); }
.btn-success { background: var(--success); color: #fff; box-shadow: 0 2px 12px rgba(46,204,113,0.3); }
.btn-success:hover:not(:disabled) { background: #27ae60; }
.btn-sm { padding: 0.4rem 0.85rem; font-size: 0.82rem; }
.btn-lg { padding: 0.85rem 2rem; font-size: 1rem; }
.btn-xl { padding: 1rem 2.5rem; font-size: 1.1rem; border-radius: var(--radius); }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; transition: all var(--transition); }
.card:hover { border-color: rgba(240,165,0,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--text-dim); font-weight: 600; }
.form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

input[type="text"], input[type="url"], textarea, select {
  width: 100%; padding: 0.75rem 1rem; background: var(--bg-input);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.95rem; font-family: inherit;
  transition: all var(--transition); outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
select { cursor: pointer; }
select option { background: var(--bg-main); color: var(--text); }
textarea { resize: vertical; min-height: 100px; }
/* Revision image upload */
.revision-images { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.revision-images .thumb { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.revision-images .thumb img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.revision-images .thumb .remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(231,76,60,0.9); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.revision-images .add-img { width: 100px; height: 100px; border: 2px dashed var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 0.75rem; gap: 0.25rem; transition: all 0.2s; }
.revision-images .add-img:hover { border-color: var(--accent); color: var(--accent); }
.revision-images .add-img span { font-size: 1.5rem; }
.revision-history-images { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
.revision-history-images img { width: 120px; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s; }
.revision-history-images img:hover { transform: scale(1.05); }
.img-lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.img-lightbox img { max-width: 95%; max-height: 95%; border-radius: 8px; }


.dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
.dashboard-header h2 { font-size: 1.4rem; font-weight: 700; }
.projects-grid { display: grid; gap: 1rem; }
.project-card { cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
.project-card:hover { transform: translateY(-2px); }
.project-info { flex: 1; min-width: 0; }
.project-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-meta { font-size: 0.8rem; color: var(--text-dim); display: flex; gap: 1rem; flex-wrap: wrap; }
.project-type-badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 10px; background: rgba(52,152,219,0.15); color: var(--info); font-weight: 600; }

.status-badge { padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.status-created { background: rgba(52,152,219,0.15); color: var(--info); }
.status-briefing { background: var(--accent-glow); color: var(--accent); }
.status-brief_ready { background: rgba(46,204,113,0.15); color: var(--success); }
.status-qa_submitted { background: rgba(155,89,182,0.15); color: var(--purple); }
.status-brief_final { background: rgba(46,204,113,0.25); color: var(--success); }
.status-building { background: var(--accent-glow); color: var(--accent); }
.status-done { background: rgba(46,204,113,0.3); color: var(--success); }
.status-needs_clarification { background: rgba(231,76,60,0.2); color: #e74c3c; }
.status-revisions { background: rgba(243,156,18,0.3); color: #f39c12; }
.status-review { background: rgba(155,89,182,0.3); color: #9b59b6; }
.status-approved { background: rgba(46,204,113,0.4); color: #2ecc71; }
.status-dns_setup { background: rgba(52,152,219,0.3); color: var(--info); }
.status-deploying { background: var(--accent-glow); color: var(--accent); }
.status-live { background: rgba(46,204,113,0.5); color: #fff; }
.status-deployed { background: rgba(46,204,113,0.4); color: #2ecc71; }

.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
.empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
.empty-state p { margin-bottom: 1.5rem; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; animation: fadeIn 0.2s ease; }
.modal { background: var(--bg-main); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 520px; box-shadow: var(--shadow-lg); margin-top: 2rem; }
.modal h3 { font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
.modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.75rem; }

.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
.detail-header-left { display: flex; align-items: center; gap: 0.75rem; }
.detail-header h2 { font-size: 1.3rem; font-weight: 700; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.info-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
.info-item-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
.info-item-value { font-size: 0.95rem; word-break: break-all; }
.info-item-value a { color: var(--accent); text-decoration: none; }
.info-item-value a:hover { text-decoration: underline; }
.info-item.full { grid-column: 1 / -1; }

.status-flow { display: flex; align-items: center; gap: 0.35rem; margin-bottom: 2rem; flex-wrap: wrap; }
.status-step { display: flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); padding: 0.35rem 0.6rem; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border); }
.status-step.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
.status-step.done { color: var(--success); border-color: rgba(46,204,113,0.3); background: rgba(46,204,113,0.1); }
.status-arrow { color: var(--text-muted); font-size: 0.7rem; }

.action-section { text-align: center; padding: 2rem; border: 2px dashed var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; }
.action-section.highlight { border-color: var(--accent); background: var(--accent-glow); }
.action-section.waiting { border-color: var(--purple); background: rgba(155,89,182,0.08); }
.action-section p { color: var(--text-dim); margin-bottom: 1rem; font-size: 0.95rem; }

.brief-section { margin-bottom: 1.5rem; }
.brief-section h3 { font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
.brief-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; line-height: 1.8; font-size: 0.92rem; }
.brief-content h1 { font-size: 1.3rem; color: var(--accent); margin: 1.5rem 0 0.5rem 0; }
.brief-content h2 { font-size: 1.1rem; color: var(--accent); margin: 1.25rem 0 0.5rem 0; }
.brief-content h3 { font-size: 1rem; color: var(--accent); margin: 1rem 0 0.4rem 0; }
.brief-content ul, .brief-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
.brief-content li { margin: 0.25rem 0; }
.brief-content p { margin: 0.5rem 0; }
.brief-content strong { color: var(--accent); }

.qa-section { margin-bottom: 1.5rem; }
.qa-section h3 { font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
.qa-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 0.75rem; }
.qa-question { font-weight: 700; margin-bottom: 0.5rem; color: var(--accent); font-size: 0.95rem; }
.qa-answer { margin-top: 0.5rem; }
.qa-answer textarea { min-height: 60px; }

.demo-link-section { text-align: center; padding: 2rem; background: rgba(46,204,113,0.1); border: 2px solid rgba(46,204,113,0.3); border-radius: var(--radius); margin-bottom: 1.5rem; }
.demo-link-section h3 { color: var(--success); margin-bottom: 1rem; }
.demo-link { font-size: 1.1rem; color: var(--accent); text-decoration: none; word-break: break-all; }
.demo-link:hover { text-decoration: underline; }

.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 0.5rem; }
.toast { padding: 0.75rem 1.25rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.5s forwards; box-shadow: var(--shadow); }
.toast-success { background: rgba(46,204,113,0.9); color: #fff; }
.toast-error { background: rgba(231,76,60,0.9); color: #fff; }
.toast-info { background: rgba(52,152,219,0.9); color: #fff; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
@keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.template-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
.queue-tab.active { background: var(--accent); color: var(--bg-deep); border-color: var(--accent); }

@media (max-width: 640px) {
  .container { padding: 1rem; }
  .header { padding: 0.75rem 1rem; }
  .header { flex-wrap: wrap; gap: 0.5rem; }
  .header-actions { gap: 0.4rem !important; }
  .header-actions .btn-sm { min-height: 44px; padding: 0.5rem 0.75rem; font-size: 0.8rem; }
  .dashboard-header .btn { min-height: 44px; }
  .info-grid { grid-template-columns: 1fr; }
  .modal { padding: 1.5rem; }
  .status-step { font-size: 0.65rem; padding: 0.25rem 0.45rem; }
  .btn-xl { padding: 0.85rem 1.5rem; font-size: 1rem; }
  .project-card { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  .project-name { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .status-badge { align-self: flex-start; }
  .dashboard-controls { flex-direction: column; gap: 0.5rem; }
  .dashboard-controls input, .dashboard-controls select { width: 100%; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand" onclick="navigateTo('dashboard')">
    <div class="header-logo">DS</div>
    <div class="header-title">Demo <span>Sites</span></div>
  </div>
  <div class="header-actions" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
    <button class="btn btn-secondary btn-sm" onclick="toggleQueue()" id="queueBtn" style="font-size:0.8rem">⚡ Задачи <span id="queueBadge" style="background:var(--accent);color:var(--bg-deep);padding:0.1rem 0.4rem;border-radius:10px;font-size:0.7rem;font-weight:800;margin-left:0.3rem;display:none">0</span></button>
    <button id="auth-btn" class="btn btn-secondary btn-sm" onclick="toggleAuth()" style="font-size:0.8rem">🔒 Влез</button>
    <div class="poll-indicator" id="pollIndicator">
      <span class="poll-dot"></span>
      <span>Live</span>
    </div>
  </div>
</header>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <!-- DASHBOARD -->
  <div id="dashboardView" class="view active">
    <div class="dashboard-header">
      <h2>Проекти</h2>
      <button class="btn btn-primary" onclick="showNewProjectModal()">+ Нов проект</button>
    </div>
    <div class="dashboard-controls" style="display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <input id="projectSearch" type="search" placeholder="🔍 Търси по име..." style="flex:1;min-width:200px;padding:0.6rem 1rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem" oninput="renderDashboard()">
      <select id="statusFilter" style="padding:0.6rem 1rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.85rem;cursor:pointer" onchange="renderDashboard()">
        <option value="">Всички статуси</option>
        <option value="created">Създадени</option>
        <option value="building,briefing,qa_submitted,brief_ready,brief_final,revisions,deploying">В процес</option>
        <option value="done,review,needs_clarification">За преглед</option>
        <option value="live,deployed,approved">На живо</option>
      </select>
      <select id="sortSelect" style="padding:0.6rem 1rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.85rem;cursor:pointer" onchange="renderDashboard()">
        <option value="newest">Най-нови</option>
        <option value="oldest">Най-стари</option>
        <option value="name">По име</option>
        <option value="status">По статус</option>
      </select>
    </div>
    <div id="projectsList" class="projects-grid"></div>
  </div>

  <!-- TASK QUEUE -->
  <div id="queueView" class="view">
    <div class="dashboard-header">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button class="btn btn-ghost" onclick="navigateTo('dashboard')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3L6 9l6 6"/></svg>
        </button>
        <h2>⚡ Task Queue</h2>
      </div>
    </div>
    <div id="queueStats" style="display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap"></div>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm queue-tab active" onclick="switchQueueTab('active')" id="qtActive">🔄 Активни</button>
      <button class="btn btn-secondary btn-sm queue-tab" onclick="switchQueueTab('done')" id="qtDone">✅ Завършени</button>
      <button class="btn btn-secondary btn-sm queue-tab" onclick="switchQueueTab('errors')" id="qtErrors">❌ Грешки</button>
    </div>
    <div id="queueActive" class="queue-panel"></div>
    <div id="queueDone" class="queue-panel" style="display:none"></div>
    <div id="queueErrors" class="queue-panel" style="display:none"></div>
  </div>

  <!-- PROJECT DETAIL -->
  <div id="detailView" class="view">
    <div class="detail-header">
      <div class="detail-header-left">
        <button class="btn btn-ghost" onclick="stopPolling();navigateTo('dashboard')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3L6 9l6 6"/></svg>
        </button>
        <h2 id="detailTitle"></h2>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span class="status-badge" id="detailStatusBadge"></span>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteProject()">Изтрий</button>
      </div>
    </div>
    <div class="status-flow" id="statusFlow"></div>
    <div class="info-grid" id="projectInfo"></div>
    <div id="actionArea"></div>
    <div id="briefArea"></div>
    <div id="qaArea"></div>
    <div id="demoArea"></div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="newProjectModal" style="display:none" onclick="event.target===this&&closeModal()">
  <div class="modal">
    <h3>🆕 Нов проект</h3>
    <div class="form-group">
      <label class="form-label">Име на бизнеса / проекта *</label>
      <input type="text" id="npName" placeholder="напр. Автоморга Петров">
    </div>
    <div class="form-group">
      <label class="form-label">Тип проект *</label>
      <select id="npType">
        <option value="">— Избери —</option>
        <option value="redesign">🔄 Редизайн на съществуващ сайт</option>
        <option value="new">🆕 Нов сайт от нулата</option>
        <option value="ecommerce">🛒 Онлайн магазин</option>
        <option value="other">📋 Друго</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Ниша</label>
      <select id="npNiche">
        <option value="">— Автоматично (Koi определя) —</option>
        <option value="счетоводство">📊 Счетоводство / Одит</option>
        <option value="стоматология">🦷 Стоматология / Дентална клиника</option>
        <option value="дограма-врати">🚪 Врати / Дограма</option>
        <option value="автосервиз">🔧 Автосервиз / Автомивка</option>
        <option value="строителство">🏗️ Строителство</option>
        <option value="hvac">❄️ Климатици / HVAC</option>
        <option value="хотел">🏨 Хотел / Настаняване</option>
        <option value="нотариус">📜 Нотариус</option>
        <option value="хранителни">🍖 Хранителни продукти</option>
        <option value="земеделие">🌾 Земеделие / Ферма</option>
        <option value="друго">📋 Друго</option>
      </select>
      <div class="form-hint">Оставете празно за автоматично определяне от съдържанието</div>
    </div>
    <div class="form-group">
      <label class="form-label">URL на текущ сайт</label>
      <input type="url" id="npWebsiteUrl" placeholder="https://example.com">
      <div class="form-hint">Ако бизнесът има съществуващ сайт</div>
    </div>
    <div class="form-group">
      <label class="form-label">Facebook / Instagram страница</label>
      <input type="url" id="npFacebookUrl" placeholder="https://facebook.com/...">
      <div class="form-hint">Ако бизнесът има социална страница</div>
    </div>
    <div class="form-group">
      <label class="form-label">Допълнителна информация</label>
      <textarea id="npNotes" placeholder="Какво иска клиентът? Специални изисквания, бележки от разговора, желания..."></textarea>
      <div class="form-hint">Всичко, което ще помогне при подготовката на заданието</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отказ</button>
      <button class="btn btn-primary btn-lg" onclick="createProject()">🚀 Създай проекта</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'demoSitesProjects_v2';
const TYPE_LABELS = { redesign:'🔄 Редизайн', new:'🆕 Нов сайт', ecommerce:'🛒 Онлайн магазин', other:'📋 Друго' };
const STATUS_LABELS = {
  created:'Създаден', briefing:'Koi анализира...', brief_ready:'Задание готово', deployed:'Качен',
  qa_submitted:'Koi обработва...', brief_final:'Финално задание',
  building:'Билд...', done:'Билд готов ✓',
  revisions:'Koi коригира...', review:'За преглед',
  needs_clarification:'Нужно уточнение ❓', approved:'Одобрено', dns_setup:'DNS настройка', deploying:'Koi качва...', live:'На живо 🌐'
};
const STATUS_FLOW_MAIN = ['created','briefing','brief_ready','qa_submitted','brief_final','building','done'];
const STATUS_FLOW_POST_BUILD = ['done','needs_clarification','revisions','review','approved','dns_setup','deploying','live'];
const STATUS_ICONS = { created:'📝', briefing:'🔍', brief_ready:'📋', qa_submitted:'💬', brief_final:'✅', building:'🔨', done:'🎉', needs_clarification:'❓', revisions:'🔧', review:'👀', approved:'🚀', dns_setup:'🌐', deploying:'📡', live:'✅' };
// Statuses where Koi works (show spinner)
const KOI_WORKING = ['briefing','qa_submitted','building','revisions','deploying'];
// Statuses where user acts
const USER_ACTION = ['created','brief_ready','brief_final','review','done','approved','dns_setup'];
// Post-build cycle statuses
const POST_BUILD = ['revisions','review','approved','dns_setup','deploying','live'];

// ===== STORAGE =====
function db() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function dbSave(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function makeSlug(name) {
  const base = name.toLowerCase().replace(/[^a-zа-яё0-9]+/gi,'-').replace(/^-|-$/g,'') || 'project';
  const all = db(); let slug = base, i = 1;
  while (all[slug]) { slug = `${base}-${i++}`; }
  return slug;
}

let currentSlug = null;
let currentProject = null;
let pollTimer = null;
let lastServerHash = null;

// ===== MIGRATE =====
(function migrate() {
  const oldData = localStorage.getItem('demoSitesProjects');
  if (!oldData) return;
  try {
    const old = JSON.parse(oldData);
    const newDb = db();
    for (const [slug, p] of Object.entries(old)) {
      if (newDb[slug]) continue;
      const a = p.answers || {};
      newDb[slug] = {
        name: p.name, slug: p.slug, type:'redesign',
        websiteUrl: a.current_url?.value||'', facebookUrl: a.social_pages?.value||'',
        notes: [a.niche?.value?`Ниша: ${a.niche.value}`:'', a.city?.value?`Град: ${a.city.value}`:'',
          a.site_condition?.value?`Състояние: ${a.site_condition.value}`:'',
          a.main_problems?.value?`Проблеми: ${a.main_problems.value}`:''].filter(Boolean).join('\n'),
        status: p.plan?'brief_ready':'created', brief: p.plan||null, qa:[], demoUrl:null,
        createdAt: p.createdAt, updatedAt: p.updatedAt
      };
    }
    dbSave(newDb);
  } catch(e) {}
})();

// ===== TOAST =====
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== NAV =====
function navigateTo(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (view === 'dashboard') {
    stopPolling();
    document.getElementById('dashboardView').classList.add('active');
    renderDashboard();
    if (location.hash !== '' && location.hash !== '#') history.pushState(null, '', location.pathname);
  }
  else if (view === 'detail') {
    document.getElementById('detailView').classList.add('active');
    renderDetail();
    startPolling();
    if (currentSlug) {
      const newHash = '#project/' + encodeURIComponent(currentSlug);
      if (location.hash !== newHash) history.pushState(null, '', newHash);
    }
  }
}

// Deep link routing
function handleHash() {
  const hash = decodeURIComponent(location.hash);
  const m = hash.match(/^#project\/(.+)$/);
  if (m) {
    const slug = m[1];
    const all = db();
    if (all[slug]) { currentSlug = slug; currentProject = all[slug]; lastServerHash = null; navigateTo('detail'); return; }
  }
  navigateTo('dashboard');
}
window.addEventListener('popstate', handleHash);

// ===== DASHBOARD =====
function renderDashboard() {
  const all = db();
  const list = document.getElementById('projectsList');
  
  // Search
  const searchVal = (document.getElementById('projectSearch')?.value || '').toLowerCase().trim();
  // Status filter
  const statusVal = document.getElementById('statusFilter')?.value || '';
  const statusSet = statusVal ? new Set(statusVal.split(',')) : null;
  // Sort
  const sortVal = document.getElementById('sortSelect')?.value || 'newest';

  let slugs = Object.keys(all);
  
  // Apply search filter
  if (searchVal) {
    slugs = slugs.filter(s => {
      const p = all[s];
      return (p.name || '').toLowerCase().includes(searchVal) || (p.niche || '').toLowerCase().includes(searchVal) || s.includes(searchVal);
    });
  }
  // Apply status filter
  if (statusSet) {
    slugs = slugs.filter(s => statusSet.has(all[s].status));
  }
  // Apply sort
  if (sortVal === 'newest') slugs.sort((a,b) => new Date(all[b].createdAt||all[b].updatedAt)-new Date(all[a].createdAt||all[a].updatedAt));
  else if (sortVal === 'oldest') slugs.sort((a,b) => new Date(all[a].createdAt||all[a].updatedAt)-new Date(all[b].createdAt||all[b].updatedAt));
  else if (sortVal === 'name') slugs.sort((a,b) => (all[a].name||'').localeCompare(all[b].name||'', 'bg'));
  else if (sortVal === 'status') {
    const ORDER = ['live','deployed','approved','review','done','needs_clarification','revisions','building','brief_final','qa_submitted','brief_ready','briefing','created'];
    slugs.sort((a,b) => ORDER.indexOf(all[a].status) - ORDER.indexOf(all[b].status));
  }
  
  if (!slugs.length && !searchVal && !statusSet) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Няма проекти</h3><p>Създай първия проект</p><button class="btn btn-primary btn-lg" onclick="showNewProjectModal()">+ Нов проект</button></div>`;
    return;
  }
  if (!slugs.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>Няма резултати</h3><p>Опитай с друг филтър</p></div>`;
    return;
  }
  list.innerHTML = slugs.map(slug => {
    const p = all[slug];
    const created = p.createdAt ? new Date(p.createdAt) : null;
    const dateStr = created ? created.toLocaleDateString('bg-BG', {day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + created.toLocaleTimeString('bg-BG', {hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="card project-card" onclick="openProject('${slug}')">
      <div class="project-info">
        <div class="project-name">${esc(p.name)}</div>
        <div class="project-meta">
          <span class="project-type-badge">${TYPE_LABELS[p.type]||p.type}</span>
          <span>📅 ${dateStr}</span>
          ${p.websiteUrl?`<span>🌐 ${truncUrl(p.websiteUrl)}</span>`:''}
        </div>
      </div>
      <span class="status-badge status-${p.status}">${STATUS_LABELS[p.status]||p.status}</span>
    </div>`;
  }).join('');
}

// ===== NEW PROJECT =====
function showNewProjectModal() {
  document.getElementById('newProjectModal').style.display = 'flex';
  ['npName','npType','npNiche','npWebsiteUrl','npFacebookUrl','npNotes'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
  setTimeout(() => document.getElementById('npName').focus(), 100);
}
function closeModal() { document.getElementById('newProjectModal').style.display = 'none'; }

function changeNiche() {
  const NICHE_OPTIONS = {
    '': '— Автоматично —',
    'счетоводство': '📊 Счетоводство / Одит',
    'стоматология': '🦷 Стоматология',
    'дограма-врати': '🚪 Врати / Дограма',
    'автосервиз': '🔧 Автосервиз',
    'строителство': '🏗️ Строителство',
    'hvac': '❄️ HVAC',
    'хотел': '🏨 Хотел',
    'нотариус': '📜 Нотариус',
    'хранителни': '🍖 Хранителни',
    'земеделие': '🌾 Земеделие',
    'друго': '📋 Друго'
  };
  const current = currentProject.niche || currentProject.nicheOverride || '';
  const options = Object.entries(NICHE_OPTIONS).map(([v,l]) => `${v===current?'→ ':''}${l} (${v||'auto'})`).join('\n');
  const choice = prompt(`Изберете ниша:\n\n${Object.entries(NICHE_OPTIONS).map(([v,l]) => `${v||'auto'} = ${l}`).join('\n')}\n\nВъведете кода:`, current);
  if (choice === null) return;
  const niche = choice.trim() || null;
  const all = db();
  const p = all[currentSlug];
  p.nicheOverride = niche;
  p.niche = niche || 'друго';
  p.updatedAt = new Date().toISOString();

  // Auto-manage template_select QA based on niche
  const TEMPLATE_NICHES_MAP = {
    'счетоводство': 'счетоводство',
    'стоматология': 'стоматолог',
    'дограма-врати': 'дограма-врати'
  };
  const catalogKey = TEMPLATE_NICHES_MAP[niche];
  const qa = p.qa || [];
  const existingIdx = qa.findIndex(q => q.type === 'template_select');

  if (catalogKey) {
    // Niche has templates — add or update template_select
    const tplQ = {
      question: 'Кой темплейт да използваме за сайта?',
      answer: '', type: 'template_select',
      niche: catalogKey, status: 'pending'
    };
    if (existingIdx >= 0) {
      qa[existingIdx].niche = catalogKey;
      qa[existingIdx].answer = ''; // reset selection
    } else {
      qa.unshift(tplQ);
    }
  } else {
    // Niche has no templates — remove template_select if exists
    if (existingIdx >= 0) qa.splice(existingIdx, 1);
  }
  p.qa = qa;

  dbSave(all);
  currentProject = all[currentSlug];
  renderDetail();
  pushToGitHub(currentSlug);
  toast(`Ниша променена на: ${niche || 'автоматично'}`, 'success');
}

function createProject() {
  const name = document.getElementById('npName').value.trim();
  const type = document.getElementById('npType').value;
  if (!name) { toast('Въведете име','error'); return; }
  if (!type) { toast('Изберете тип','error'); return; }
  const slug = makeSlug(name);
  const all = db();
  all[slug] = {
    name, slug, type,
    websiteUrl: document.getElementById('npWebsiteUrl').value.trim(),
    facebookUrl: document.getElementById('npFacebookUrl').value.trim(),
    notes: document.getElementById('npNotes').value.trim(),
    nicheOverride: document.getElementById('npNiche').value || null,
    status:'created', brief:null, qa:[], demoUrl:null,
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  dbSave(all); closeModal(); toast('Проектът е създаден! 🎉');
  openProject(slug);
}

function openProject(slug) {
  currentSlug = slug; currentProject = db()[slug];
  if (!currentProject) { toast('Не е намерен','error'); return; }
  lastServerHash = null;
  navigateTo('detail');
}

// ===== DETAIL =====
function renderDetail() {
  if (!currentProject) return;
  const p = currentProject;
  document.getElementById('detailTitle').textContent = p.name;
  const badge = document.getElementById('detailStatusBadge');
  badge.textContent = STATUS_LABELS[p.status]||p.status;
  badge.className = `status-badge status-${p.status}`;

  // Determine which flow to show
  const inPostBuild = POST_BUILD.includes(p.status);
  const flowToShow = inPostBuild ? STATUS_FLOW_POST_BUILD : STATUS_FLOW_MAIN;
  const si = flowToShow.indexOf(p.status);
  document.getElementById('statusFlow').innerHTML = flowToShow.map((s,i) => {
    const cls = i<si?'done':i===si?'active':'';
    const arrow = i<flowToShow.length-1?'<span class="status-arrow">→</span>':'';
    return `<span class="status-step ${cls}">${STATUS_ICONS[s]} ${STATUS_LABELS[s]}</span>${arrow}`;
  }).join('') + (inPostBuild ? '<div style="font-size:0.7rem;color:var(--text-muted);width:100%;margin-top:0.5rem">↻ Корекции може на всеки етап</div>' : '');

  let info = `
    <div class="info-item"><div class="info-item-label">Тип</div><div class="info-item-value">${TYPE_LABELS[p.type]||p.type}</div></div>
    <div class="info-item"><div class="info-item-label">Създаден</div><div class="info-item-value">${new Date(p.createdAt).toLocaleDateString('bg-BG')}</div></div>`;
  if (p.niche || p.nicheOverride) info += `<div class="info-item"><div class="info-item-label">Ниша</div><div class="info-item-value">${esc(p.niche || p.nicheOverride || 'друго')}${['created','brief_ready'].includes(p.status) ? ` <button onclick="changeNiche()" style="margin-left:8px;padding:2px 8px;font-size:0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer">✏️ Промени</button>` : ''}</div></div>`;
  if (p.websiteUrl) info += `<div class="info-item"><div class="info-item-label">Уебсайт</div><div class="info-item-value"><a href="${esc(p.websiteUrl)}" target="_blank">${esc(p.websiteUrl)}</a></div></div>`;
  if (p.facebookUrl) info += `<div class="info-item"><div class="info-item-label">Facebook</div><div class="info-item-value"><a href="${esc(p.facebookUrl)}" target="_blank">${esc(p.facebookUrl)}</a></div></div>`;
  if (p.notes) info += `<div class="info-item full"><div class="info-item-label">Бележки</div><div class="info-item-value">${esc(p.notes).replace(/\n/g,'<br>')}</div></div>`;
  document.getElementById('projectInfo').innerHTML = info;

  renderAction(p);
  renderBrief(p);
  renderQa(p);
  renderBottomActions(p);
  renderDemo(p);
  renderRevisions(p);
}

function renderAction(p) {
  const a = document.getElementById('actionArea');
  if (p.status === 'created') {
    a.innerHTML = `<div class="action-section highlight">
      <p>Проектът е готов. Натисни бутона и Koi ще анализира и подготви задание.</p>
      <button class="btn btn-primary btn-xl" onclick="doAction('briefing')">🚀 Пусни за задание</button></div>`;
  } else if (KOI_WORKING.includes(p.status)) {
    const msgs = { briefing:'Koi анализира и подготвя задание...', qa_submitted:'Koi обработва отговорите и обогатява заданието...', building:'Koi билдва демо сайта...' };
    a.innerHTML = `<div class="action-section waiting">
      <div class="spinner"></div>
      <p style="margin-top:1rem">${msgs[p.status]}</p>
      <p style="font-size:0.8rem;color:var(--text-muted)">Страницата се обновява автоматично на всеки 10 сек</p></div>`;
  } else if (p.status === 'brief_ready') {
    a.innerHTML = `<div class="action-section" style="border:none;padding:0.5rem">
      <p style="font-size:0.85rem">👇 Прегледай заданието и отговори на въпросите по-долу</p></div>`;
  } else if (p.status === 'brief_final') {
    a.innerHTML = `<div class="action-section" style="border:none;padding:0.5rem">
      <p style="font-size:0.85rem">👇 Прегледай финалното задание и потвърди билда долу</p></div>`;
  } else if (p.status === 'done') {
    a.innerHTML = `<div class="action-section" style="border:none;padding:0.5rem">
      <p style="font-size:0.85rem">👇 Прегледай демото. Ако има нужда от корекции — опиши ги по-долу. Ако всичко е наред — одобри.</p></div>`;
  } else if (p.status === 'needs_clarification') {
    const cl = p.clarification || {};
    const qs = cl.questions || ['Моля, опишете по-подробно какво искате да се промени.'];
    a.innerHTML = `<div class="action-section highlight" style="border-color: var(--danger)">
      <h3 style="color:#e74c3c;margin-bottom:0.5rem">❓ Нужно е уточнение</h3>
      <p style="font-size:0.9rem;margin-bottom:1rem">За да продължим, моля отговорете на следните въпроси:</p>
      <div style="text-align:left;max-width:500px;margin:0 auto">
        ${qs.map((q,i) => `<div style="margin-bottom:1rem">
          <label style="font-weight:600;display:block;margin-bottom:0.3rem">${q}</label>
          <textarea id="clarify-${i}" rows="2" style="width:100%;resize:vertical;padding:0.5rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-input);color:var(--text);font-size:0.9rem" placeholder="Вашият отговор..."></textarea>
        </div>`).join('')}
      </div>
      <button class="btn btn-success btn-xl" onclick="submitClarification()" style="margin-top:0.5rem">📩 Изпрати отговорите</button>
    </div>`;
  } else if (p.status === 'revisions') {
    a.innerHTML = `<div class="action-section waiting">
      <div class="spinner"></div>
      <p style="margin-top:1rem">Koi работи по корекциите...</p>
      <p style="font-size:0.8rem;color:var(--text-muted)">Страницата се обновява автоматично на всеки 10 сек</p></div>`;
  } else if (p.status === 'review') {
    a.innerHTML = `<div class="action-section" style="border:none;padding:0.5rem">
      <p style="font-size:0.85rem">👇 Корекциите са направени. Прегледай и одобри или добави нови</p></div>`;
  } else if (p.status === 'approved') {
    a.innerHTML = `<div class="action-section highlight">
      <h3 style="color:var(--success);margin-bottom:1rem">🚀 Сайтът е одобрен!</h3>
      <p>Въведи домейн, на който да качим финалния сайт:</p>
      <div style="max-width:400px;margin:1rem auto">
        <input type="text" id="deployDomain" placeholder="напр. example.bg" value="${esc(p.deployDomain||'')}"
          style="text-align:center;font-size:1.1rem">
        <div class="form-hint" style="margin-top:0.25rem">Домейнът, на който клиентът иска сайта</div>
      </div>
      <button class="btn btn-success btn-xl" onclick="saveDomain()" style="margin-top:1rem">🌐 Запази и поискай DNS данни</button>
    </div>`;
  } else if (p.status === 'dns_setup') {
    a.innerHTML = `<div class="action-section highlight">
      <h3 style="color:var(--info);margin-bottom:1rem">🌐 DNS настройка за ${esc(p.deployDomain)}</h3>
      ${p.dnsRecords ? `
        <div style="text-align:left;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin:1rem 0">
          <p style="margin-bottom:1rem;font-weight:700">Настрой следните DNS записи:</p>
          <div style="font-family:monospace;font-size:0.9rem;line-height:2">
            ${p.dnsRecords.map(r => `<div style="padding:0.5rem;background:var(--bg-input);border-radius:4px;margin-bottom:0.5rem">
              <span style="color:var(--accent)">${esc(r.type)}</span> 
              <span style="color:var(--text-dim)">${esc(r.name)}</span> → 
              <span style="color:var(--success)">${esc(r.value)}</span>
              ${r.note ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem">${esc(r.note)}</div>` : ''}
            </div>`).join('')}
          </div>
        </div>
        <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:1rem">След като настроиш DNS записите, натисни бутона.</p>
        <button class="btn btn-success btn-xl" onclick="confirmDns()">✅ DNS е настроен</button>
      ` : `
        <div class="spinner"></div>
        <p style="margin-top:1rem">Koi подготвя DNS данните...</p>
      `}
    </div>`;
  } else if (p.status === 'deploying') {
    a.innerHTML = `<div class="action-section waiting">

function selectTemplate(qaIdx, templateId) {
  const input = document.getElementById(`qa_${qaIdx}`);
  if (!input) return;
  
  // Toggle: if clicking already selected, deselect
  const newValue = input.value === templateId ? '' : templateId;
  input.value = newValue;
  
  // Update visual state for all cards belonging to this qa index
  document.querySelectorAll(`[data-qa-idx="${qaIdx}"]`).forEach(card => {
    const isThis = card.id === `tpl_${templateId}` && newValue === templateId;
    card.style.borderColor = isThis ? 'var(--accent)' : 'var(--border)';
    card.style.background = isThis ? 'var(--accent-glow)' : 'var(--bg-card)';
    // Update checkmark
    const existingCheck = card.querySelector('[data-check]');
    if (existingCheck) existingCheck.remove();
    if (isThis) {
      const check = document.createElement('div');
      check.setAttribute('data-check', '1');
      check.style.cssText = 'position:absolute;top:8px;right:8px;background:var(--accent);color:var(--bg-deep);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;z-index:2';

      card.appendChild(check);

  });

}

function doAction(newStatus) {
  if (!currentProject) return;
  // Collect QA answers before submitting
  if (newStatus === 'qa_submitted' && currentProject.qa) {
    currentProject.qa = currentProject.qa.map((q,i) => {
      const item = typeof q === 'string' ? { question: q, answer: '' } : q;
      const el = document.getElementById(`qa_${i}`);
      if (el) item.answer = el.value.trim();
      // Keep type field for template_select items
      return item;
    });
  }
  currentProject.status = newStatus;
  currentProject.updatedAt = new Date().toISOString();
  const all = db(); all[currentSlug] = currentProject; dbSave(all);
  const msgs = { briefing:'Изпратено за задание!', qa_submitted:'Отговори изпратени!', building:'Билдът започва!' };
  toast(msgs[newStatus]||'Обновено', 'info');
  saveToGH();
  renderDetail();
}

// ===== AUTO-POLLING =====
function startPolling() {
  stopPolling();
  if (!currentSlug) return;
  pollTimer = setInterval(() => pollServer(), 10000);
  console.log('Polling started for', currentSlug);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollServer() {
  if (!currentSlug) return;
  
  // GUARD: Don't re-render if user is actively typing in any input/textarea
  const activeEl = document.activeElement;
  const userIsTyping = activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'INPUT' || activeEl.isContentEditable);
  
  try {
    const encodedSlug = encodeURIComponent(currentSlug);
    const res = await fetch(`${PROXY_URL}/api/data/${encodedSlug}.json`, { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));

    // GitHub is ALWAYS source of truth
    if (JSON.stringify(content) !== JSON.stringify(currentProject)) {
      const all = db();
      all[currentSlug] = content;
      currentProject = content;
      dbSave(all);
      
      // Only re-render if user is NOT typing — otherwise just update data silently
      if (userIsTyping) {
        console.log('Poll: data updated silently (user is typing)');
      } else {
        toast('🔄 Обновено', 'info');
        renderDetail();
      }
    }
  } catch(e) { console.log('Poll error:', e); }
}

function confirmDeleteProject() {
  if (!confirm(`Изтриване на "${currentProject?.name}"?`)) return;
  stopPolling();
  const all = db(); delete all[currentSlug]; dbSave(all);
  currentSlug = null; currentProject = null;
  toast('Изтрит'); navigateTo('dashboard');
}

// ===== PASTE HANDLER =====
document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  var hasImage = false;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      hasImage = true;
      var file = items[i].getAsFile();
      if (file && typeof handleRevisionImages === 'function') {
        handleRevisionImages([file]);
      }
    }
  }
  if (hasImage) e.preventDefault();
});

// ===== GITHUB =====
// ===== IMAGE HANDLING FOR REVISIONS =====
let _revisionImages = [];
function handleRevisionImages(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (_revisionImages.length >= 5) { toast('Максимум 5 снимки', 'error'); break; }
    compressImage(file, 1200, 0.8).then(function(dataUrl) { _revisionImages.push(dataUrl); renderRevisionThumbs(); });
  }
  document.getElementById('revisionFileInput').value = '';
}
function compressImage(file, maxDim, quality) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; } else { w = Math.round(w * maxDim / h); h = maxDim; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  // Save as new revision with enriched instructions

  currentProject.revisionHistory.push({

  currentProject.status = 'revisions';

// Writes go through VPS proxy (token stays server-side, never in client code)
const PROXY_URL = 'https://demo-sites-api.vercel.app';
// Auth: cookie-based session, no secrets in client code

async function saveToGH() {
  if (!currentProject) return;
  try {
    const slug = encodeURIComponent(currentSlug);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentProject, null, 2))));
    // Get current SHA
    let sha = null;
    try {
      const r = await fetch(`${PROXY_URL}/api/data/${slug}.json`);
      if (r.ok) sha = (await r.json()).sha;
    } catch(e) {}
    const rawPath = `data/${currentSlug}.json`;
    const body = { message: `[${currentProject.status}] ${currentProject.name}`, content, path: rawPath };
    if (sha) body.sha = sha;
    const res = await fetch(`${PROXY_URL}/api/data/${slug}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      if (res.status === 401) {
        showLoginModal();
        return;
      }
      throw new Error('Save failed: ' + res.status);
    }
  } catch(e) {
    console.log('Save error:', e);
    toast('Грешка при запис: ' + e.message, 'error');
  }
}

async function doLogin() {
  const pwd = document.getElementById('login-pwd')?.value;
  const errEl = document.getElementById('login-error');
  if (!pwd) return;
  try {
    const r = await fetch(`${PROXY_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ password: pwd })
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      _isLoggedIn = true;
      updateAuthUI();
      document.getElementById('login-modal')?.remove();
      toast('✅ Влязохте успешно', 'success');
      // Retry save
      saveToGH();
    } else {
      if (errEl) { errEl.textContent = d.error || 'Грешна парола'; errEl.style.display = 'block'; }
    }
  } catch(e) {
    if (errEl) { errEl.textContent = 'Грешка при свързване'; errEl.style.display = 'block'; }
  }
}

async function doLogout() {
  await fetch(`${PROXY_URL}/api/logout`, { method: 'POST', credentials: 'include' });
  _isLoggedIn = false;
  updateAuthUI();
  toast('Излязохте', 'info');
}

function toggleAuth() {

function truncUrl(u) { try{return new URL(u).hostname;}catch{return u.substring(0,30);} }

function renderMd(md) {

// ===== MIGRATE OLD FORMAT =====
function migrateProject(content) {
  // Old v2 format has 'answers' and 'plan' but no type/status
  if (!content.status && content.answers) {
    const a = content.answers || {};
    content.type = 'redesign';
    content.websiteUrl = content.websiteUrl || a.current_url?.value || '';
    content.facebookUrl = content.facebookUrl || a.social_pages?.value || '';
    if (!content.notes) {
      content.notes = [
        a.niche?.value ? `Ниша: ${a.niche.value}` : '',
        a.city?.value ? `Град: ${a.city.value}` : '',
        a.site_condition?.value ? `Състояние: ${a.site_condition.value}` : '',
        a.main_problems?.value ? `Проблеми: ${a.main_problems.value}` : ''
      ].filter(Boolean).join('\n');
    }
    content.status = content.plan ? 'brief_ready' : 'created';
    content.brief = content.brief || content.plan || null;
    content.qa = content.qa || [];
    content.demoUrl = content.demoUrl || null;
  }
  // Ensure minimum fields
  if (!content.type) content.type = 'other';
  if (!content.status) content.status = 'created';
  return content;
}

// ===== SYNC FROM GITHUB ON LOAD =====

async function syncFromGH() {
  try {
    // Fetch file list via VPS proxy (no cache issues)
    const ghRes = await fetch(`${PROXY_URL}/api/data`, { cache: 'no-store' });
    if (!ghRes.ok) { console.log('GH sync failed:', ghRes.status); return; }
    const files = await ghRes.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));
    if (!jsonFiles.length) return;

    const all = db();
    let updated = false;

    await Promise.all(jsonFiles.map(async (f) => {
      try {
        // Fetch each file via proxy (avoids raw.githubusercontent.com cache)
        const encodedName = encodeURIComponent(f.name);
        const r = await fetch(`${PROXY_URL}/api/data/${encodedName}`, { cache: 'no-store' });
        if (!r.ok) return;
        const fileData = await r.json();
        // Decode base64 content
        let content;
        try {
          content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
        } catch {
          // Fallback: try download_url
          const r2 = await fetch(f.download_url + '?t=' + Date.now(), { cache: 'no-store' });
          if (!r2.ok) return;
          content = await r2.json();
        }
        content = migrateProject(content);
        const slug = content.slug;
        if (!slug) return;

        const local = all[slug];
        if (!local || JSON.stringify(local) !== JSON.stringify(content)) {
          all[slug] = content;
          updated = true;
        }
      } catch(e) { console.log('Sync file error:', f.name, e); }
    }));

    if (updated) {
      dbSave(all);
      renderDashboard();
      if (currentSlug && all[currentSlug]) {
        currentProject = all[currentSlug];
        if (document.getElementById('detailView').classList.contains('active')) renderDetail();
      }
      console.log('Synced from GitHub —', Object.keys(all).length, 'projects');
    }
  } catch(e) { console.log('GH sync error:', e); }
}

// ===== TASK QUEUE =====
const QUEUE_URL_RAW = 'https://raw.githubusercontent.com/koiopenclaw-max/demo-sites/main/scripts/demo-queue.json';
const Q_ACTION_ICONS = { briefing:'📋', qa_submitted:'💬', building:'🔨', revisions:'🔧', dns_setup:'🌐', deploying:'🚀' };
const Q_ACTION_LABELS = { briefing:'Briefing', qa_submitted:'QA обработка', building:'Билд', revisions:'Корекции', dns_setup:'DNS', deploying:'Деплой' };

function humanizeResult(r) {
  if (!r) return '';
  // Strip URLs, keep just the human part
  let h = r.replace(/https?:\/\/[^\s)]+/g, '').trim();
  // Clean up common patterns
  h = h.replace(/\(\s*\)/g, '').replace(/\s+/g, ' ').trim();
  // If nothing left, extract domain from original
  if (!h && r.includes('http')) {
    try { h = new URL(r.match(/https?:\/\/[^\s)]+/)[0]).hostname; } catch {}
  }
  return h || r.slice(0, 80);
}

function switchQueueTab(tab) {

  document.querySelectorAll('.queue-panel').forEach(p => p.style.display = 'none');

  } else {

function queueTimeAgo(ds) {
  if (!ds) return '—';
  const m = Math.floor((Date.now() - new Date(ds).getTime()) / 60000);
  if (m < 1) return 'сега';
  if (m < 60) return `${m} мин`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} ч`;
  return `${Math.floor(h / 24)} дни`;
}

function queueDuration(s, e) {
  if (!s || !e) return '—';
  const sec = Math.floor((new Date(e) - new Date(s)) / 1000);
  if (sec < 60) return `${sec}s`;
  return `${Math.floor(sec / 60)}m ${sec % 60}s`;
}

function renderQueueTask(t) {
  const icon = Q_ACTION_ICONS[t.action] || '📝';
  const label = Q_ACTION_LABELS[t.action] || t.action;
  const statusClass = t.status === 'in_progress' ? 'status-building' : t.status === 'error' ? 'status-revisions' : t.status === 'done' ? 'status-done' : 'status-briefing';
  const statusText = t.status === 'in_progress' ? '⚙️ работи' : t.status === 'error' ? '❌ грешка' : t.status === 'done' ? '✅ готово' : '⏳ чака';
  return `<div class="card" style="margin-bottom:0.75rem;display:flex;align-items:center;gap:1rem">
    <div style="font-size:1.3rem;width:36px;text-align:center">${icon}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:0.95rem">${esc(t.name)}</div>
      <div style="font-size:0.8rem;color:var(--text-dim);display:flex;gap:0.75rem;flex-wrap:wrap">
        <span>${label}</span>
        <span>⏱ ${t.status === 'in_progress' ? 'от ' + queueTimeAgo(t.startedAt) : t.status === 'done' || t.status === 'error' ? queueDuration(t.startedAt, t.completedAt) : 'чака ' + queueTimeAgo(t.createdAt)}</span>
      </div>
      ${t.error ? `<div style="font-size:0.8rem;color:var(--danger);margin-top:0.3rem;padding:0.4rem;background:rgba(231,76,60,0.1);border-radius:6px">❌ ${esc(t.error)}</div>` : ''}
      ${t.result ? `<div style="font-size:0.8rem;color:var(--success);margin-top:0.3rem">✅ ${esc(humanizeResult(t.result))}</div>` : ''}
    </div>
    <span class="status-badge ${statusClass}">${statusText}</span>
  </div>`;
}

async function loadQueueData() {
  try {
    const res = await fetch(QUEUE_URL_RAW + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();

    const pending = (data.tasks || []).filter(t => t.status === 'pending');
    const active = (data.tasks || []).filter(t => t.status === 'in_progress');
    const allActive = [...active, ...pending];
    const done = (data.completed || []).slice(-20).reverse();
    const errors = (data.completed || []).filter(t => t.status === 'error');

    // Stats
    document.getElementById('queueStats').innerHTML = `
      <div class="card" style="padding:0.75rem 1rem;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:var(--accent)">${pending.length}</div><div style="font-size:0.7rem;color:var(--text-dim)">ЧАКАЩИ</div></div>
      <div class="card" style="padding:0.75rem 1rem;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:var(--info)">${active.length}</div><div style="font-size:0.7rem;color:var(--text-dim)">АКТИВНИ</div></div>
      <div class="card" style="padding:0.75rem 1rem;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:var(--success)">${(data.completed||[]).filter(t=>t.status==='done').length}</div><div style="font-size:0.7rem;color:var(--text-dim)">ГОТОВИ</div></div>
      <div class="card" style="padding:0.75rem 1rem;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:var(--danger)">${errors.length}</div><div style="font-size:0.7rem;color:var(--text-dim)">ГРЕШКИ</div></div>
    `;

    document.getElementById('queueActive').innerHTML = allActive.length
      ? allActive.map(renderQueueTask).join('')
      : '<div style="text-align:center;padding:2rem;color:var(--text-dim)">✨ Няма чакащи задачи</div>';

    const doneOnly = done.filter(t => t.status === 'done').slice(0, 15);
    document.getElementById('queueDone').innerHTML = doneOnly.length
      ? doneOnly.map(renderQueueTask).join('')
      : '<div style="text-align:center;padding:2rem;color:var(--text-dim)">📭 Няма завършени</div>';

    document.getElementById('queueErrors').innerHTML = errors.length
      ? errors.slice(-15).reverse().map(renderQueueTask).join('')
      : '<div style="text-align:center;padding:2rem;color:var(--text-dim)">🎉 Няма грешки</div>';

    // Update badge in header
    const badge = document.getElementById('queueBadge');
    const total = pending.length + active.length;
    if (total > 0) { badge.textContent = total; badge.style.display = 'inline'; }
    else { badge.style.display = 'none'; }

    // Update tab counts
    const qa = document.getElementById('qtActive');
    const qd = document.getElementById('qtDone');
    const qe = document.getElementById('qtErrors');
    if (qa) qa.textContent = `🔄 Активни (${allActive.length})`;
    if (qd) qd.textContent = `✅ Завършени (${doneOnly.length})`;
    if (qe) qe.textContent = `❌ Грешки (${errors.length})`;

  } catch (e) { console.log('Queue load error:', e); }
}
